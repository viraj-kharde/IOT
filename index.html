<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IoT Unit-I — Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="progress-bar-wrap"><div id="readProgress"></div></div>

<!-- ── HERO ── -->
<header>
  <div class="header-grid"></div>
  <div class="header-orb orb1"></div>
  <div class="header-orb orb2"></div>
  <div class="header-orb orb3"></div>
  <div class="header-content">
    <div class="header-tag">SPPU · Class SE-B · Unit I</div>
    <h1>Internet of<br/><span>Things</span></h1>
    <p class="header-sub">All 15 exam questions with complete answers. Click any question to expand.</p>
    <div class="header-stats">
      <div class="hstat"><div class="hstat-num">15</div><div class="hstat-label">Questions</div></div>
      <div class="hstat"><div class="hstat-num">75</div><div class="hstat-label">Total Marks</div></div>
      <div class="hstat"><div class="hstat-num">7</div><div class="hstat-label">Topics</div></div>
    </div>
  </div>
  <div class="scroll-hint">
    <span>SCROLL</span>
    <div class="scroll-line"></div>
  </div>
</header>

<!-- ── NAV ── -->
<nav>
  <div class="nav-inner">
    <button class="nav-btn active" onclick="filterByMarks('all',this)">All</button>
    <button class="nav-btn" onclick="filterByMarks(4,this)">4-Mark</button>
    <button class="nav-btn" onclick="filterByMarks(5,this)">5-Mark</button>
    <button class="nav-btn" onclick="filterByMarks(7,this)">7-Mark</button>
    <button class="nav-btn" onclick="jumpTo('q1')">Q1</button>
    <button class="nav-btn" onclick="jumpTo('q2')">Q2</button>
    <button class="nav-btn" onclick="jumpTo('q3')">Q3</button>
    <button class="nav-btn" onclick="jumpTo('q4')">Q4</button>
    <button class="nav-btn" onclick="jumpTo('q5')">Q5</button>
    <button class="nav-btn" onclick="jumpTo('q6')">Q6</button>
    <button class="nav-btn" onclick="jumpTo('q7')">Q7</button>
    <button class="nav-btn" onclick="jumpTo('q8')">Q8</button>
    <button class="nav-btn" onclick="jumpTo('q9')">Q9</button>
    <button class="nav-btn" onclick="jumpTo('q10')">Q10</button>
    <button class="nav-btn" onclick="jumpTo('q11')">Q11</button>
    <button class="nav-btn" onclick="jumpTo('q12')">Q12</button>
    <button class="nav-btn" onclick="jumpTo('q13')">Q13</button>
    <button class="nav-btn" onclick="jumpTo('q14')">Q14</button>
    <button class="nav-btn" onclick="jumpTo('q15')">Q15</button>
  </div>
</nav>

<!-- ── MAIN ── -->
<main>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="searchInput" placeholder="Search topics, protocols, models..." oninput="doSearch()" />
  </div>

  <div class="toolbar">
    <div class="toolbar-left">Showing <span id="visCount">15</span> of 15 questions</div>
    <button class="btn-expand" onclick="toggleAll()">Expand All</button>
  </div>

  <div id="qlist"></div>

</main>

<button id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script src="script.js"></script>
</body>
</html>
